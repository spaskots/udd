<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UDD - Login | Uros Spasenic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #2c3e50; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 400px; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4">Forensic System Login</h3>
    <p class="text-center text-muted" style="font-size:0.78rem; margin-top: -10px;">Uros Spasenic &mdash; E2 59-2025</p>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div id="error-msg" class="mt-3 text-danger text-center" style="display:none;">Invalid credentials!</div>
</div>

<script>
    $("#loginForm").submit(function(e) {
        e.preventDefault();

        let loginData = {
            username: $("#username").val(),
            password: $("#password").val()
        };

        $.ajax({
            url: '/api/auth/login',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(loginData),
            success: function(response) {
                localStorage.setItem('jwtToken', response.token);
                window.location.href = "/index.html";
            },
            error: function() {
                $("#error-msg").show();
            }
        });
    });
</script>

</body>
</html>
